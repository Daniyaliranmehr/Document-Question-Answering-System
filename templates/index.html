<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document Question Answering System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow p-4">

                <h1 class="text-center mb-4">
                    Document Question Answering System
                </h1>

                <!-- 🟢 QUESTION SECTION -->
                <input
                    type="text"
                    id="questionInput"
                    class="form-control mb-3"
                    placeholder="Ask a question..."
                >

                <button
                    id="askButton"
                    class="btn btn-primary w-100"
                >
                    Ask Question
                </button>

                <div class="mt-4">

                    <h4>AI Answer:</h4>

                    <div
                        id="answerBox"
                        class="border rounded p-3 bg-white"
                    >
                        Your answer will appear here...
                    </div>

                </div>

            </div>

            <div class="card shadow p-4 mt-4">

                <h4 class="mb-3">Upload Document</h4>

                <input
                    type="text"
                    id="titleInput"
                    class="form-control mb-3"
                    placeholder="Document title"
                >

                <input
                    type="file"
                    id="fileInput"
                    class="form-control mb-3"
                >

                <button
                    id="uploadButton"
                    class="btn btn-success w-100"
                >
                    Upload Document
                </button>

                <div class="mt-3" id="uploadStatus"></div>

            </div>

        </div>

    </div>

</div>

<!-- QUESTION JS -->
<script>

document
    .getElementById("askButton")
    .addEventListener("click", async function () {

        const question = document.getElementById("questionInput").value;

        const answerBox = document.getElementById("answerBox");

        answerBox.innerHTML = "Generating answer...";

        try {

            const response = await fetch(
                "http://127.0.0.1:8000/api/qa/ask/",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        question: question
                    })
                }
            );

            const data = await response.json();

            answerBox.innerHTML = data.answer;

        } catch (error) {

            answerBox.innerHTML = "An error occurred.";

            console.error(error);
        }

    });

</script>

<!-- UPLOAD JS -->
<script>

document
    .getElementById("uploadButton")
    .addEventListener("click", async function () {

        const title = document.getElementById("titleInput").value;
        const file = document.getElementById("fileInput").files[0];
        const status = document.getElementById("uploadStatus");

        if (!title || !file) {
            status.innerHTML = "Please provide title and file.";
            return;
        }

        const formData = new FormData();

        formData.append("title", title);
        formData.append("file", file);

        status.innerHTML = "Uploading...";

        try {

            const response = await fetch(
                "http://127.0.0.1:8000/api/documents/upload/",
                {
                    method: "POST",
                    body: formData
                }
            );

            const data = await response.json();

            status.innerHTML = "Upload successful ✔";

            console.log(data);

        } catch (error) {

            status.innerHTML = "Upload failed ❌";

            console.error(error);
        }

    });

</script>

</body>

</html>
